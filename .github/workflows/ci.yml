name: CI

on:
  push:
    branches: [main, monorepo]
  pull_request:

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Syntax & import sanity (compileall)
        run: python -m compileall -q .

      # E9/F63/F7/F82 = syntax error & undefined name — gerbang minimum yang aman.
      # Perketat bertahap dengan menghapus --select setelah codebase rapi.
      - name: Ruff (critical rules)
        run: ruff check --select E9,F63,F7,F82 .

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tsconfig.ci.json mengecualikan file test mock warisan template yang
      # tipenya belum kompatibel dengan ai-sdk terbaru; kode aplikasi tetap digate penuh.
      - name: Typecheck
        run: pnpm exec tsc --noEmit -p tsconfig.ci.json

      # Lint belum dijadikan gerbang wajib — jadikan blocking setelah
      # seluruh temuan ultracite dibereskan.
      - name: Lint (advisory)
        run: pnpm lint
        continue-on-error: true
